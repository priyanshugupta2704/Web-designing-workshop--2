<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Counter App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #c9bcbc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      width: 300px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
    }

    #count {
      font-size: 45px;
      margin: 20px 0;
      font-weight: bold;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 6px;
      background-color: #23b7e4;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background-color: #18c3a6;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>React Counter Application</h1>
    <div id="count">0</div>

    <button onclick="increment()">Increment (+)</button>
    <button onclick="decrement()">Decrement (-)</button><br>
    <button onclick="reset()">Reset</button>
  </div>

  <script>
    let count = 0;

    function increment() {
      count++;
      document.getElementById("count").innerText = count;
    }

    function decrement() {
      count--;
      document.getElementById("count").innerText = count;
    }

    function reset() {
      count = 0;
      document.getElementById("count").innerText = count;
    }
  </script>

</body>
</html>
